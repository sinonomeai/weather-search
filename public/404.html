<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #2f4b8f, #1d2639);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #6f9bff;
        }
        p {
            font-size: 18px;
            margin: 20px 0;
            opacity: 0.8;
        }
        a {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }
        a:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>页面未找到</p>
        <a href="/">← 返回首页</a>
    </div>

</html>
